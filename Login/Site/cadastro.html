<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | M2R Tecnologias</title>
    <link rel="stylesheet" href="../personal-website.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="../Imagens/logo.png" type="image/png">
</head>
<body class="page-auth">
    <main>
        <section class="login-section">
            <div class="login-card fade-in-section">
                <img src="../Imagens/logo.png" alt="M2R Tecnologias Logo">
                <h2 style="font-size: 1.1rem; color: var(--color-primary); margin-bottom: 5px;">M2R Tecnologias</h2>
                <h3 style="font-size: 1.6rem; color: var(--color-text-primary); margin-top: 0; margin-bottom: 8px;">Crie sua conta</h3>
                <p>Preencha os dados abaixo para se cadastrar.</p>

                <form id="register-form" class="login-form">
                    <input type="text" id="register-usuario" placeholder="Nome de usuário" required>
                    <input type="text" id="register-name" placeholder="Seu Nome Completo" required>
                    <input type="email" id="register-email" placeholder="E-mail corporativo" required>
                    <input type="number" id="register-idade" placeholder="Sua Idade" required>
                    <div class="password-container">
                        <input type="password" id="register-password" placeholder="Senha (mínimo 6 caracteres)" required minlength="6">
                        <button type="button" class="toggle-password" id="toggle-register-password" title="Mostrar/Ocultar Senha">👁️</button>
                    </div>

                    <button type="submit" class="cta-button">Cadastrar</button>
                    <p id="register-status"></p>
                </form>

                <div class="login-links">
                    Já possui uma conta? <a href="login.html">Fazer Login</a>
                </div>
            </div>
        </section>
    </main>

    <!-- Rodapé -->
    <footer class="site-footer">
        <div class="footer-links">
            <a href="index_inicio.html">Início</a>
            <a href="index_servicos.html">Serviços</a>
            <a href="index_projetos.html">Projetos</a>
            <a href="index_blog.html">Blog</a>
            <a href="index_sobre.html">Sobre a M2R</a>
            <a href="index_contatos.html">Contato</a>
        </div>
        <p>&copy; 2026 M2R Tecnologias. Todos os direitos reservados.</p>
        <p>Desenvolvido por Marcio Rocha</p>
    </footer>

    <script src="../personal-website.js"></script>
</body>
</html>
