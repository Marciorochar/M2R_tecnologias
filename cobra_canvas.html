<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobra Interativa no Canvas | M2R</title>
    <style>
        /* Reset básico e fundo escuro moderno */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Remove barras de rolagem */
            background-color: #0c0806; /* Fundo escuro da paleta M2R */
        }

        /* O canvas ocupa toda a tela */
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <canvas id="snakeCanvas"></canvas>

    <script>
        // 1. CONFIGURAÇÃO INICIAL DO CANVAS
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;

        // Função para garantir que o canvas tenha sempre o tamanho da tela
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 2. VARIÁVEIS DE CONTROLE DO MOUSE E RATO
        const mouse = {
            x: width / 2,
            y: height / 2
        };

        const prey = {
            x: width / 2 + 100, // Rato começa um pouco ao lado
            y: height / 2,
            angle: 0
        };

        // Atualiza a posição do mouse em tempo real
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // 3. CONFIGURAÇÕES DA COBRA
        const numSegments = 100;       // Quantidade de bolinhas/segmentos no corpo
        const segmentLength = 5;      // Distância entre cada segmento
        const snakeSpeed = 0.05;      // Velocidade com que a cabeça segue o mouse
        const waveAmplitude = 2;      // Força/Largura do movimento de "S" (rastejar)
        const waveFrequency = 0.25;    // Quantidade de curvas no corpo da cobra
        const waveSpeed = 0.05;       // Velocidade muscular reduzida para um movimento mais devagar
        
        let time = 0; // Temporizador global para a animação da onda
        const segments = [];

        // Inicializa todos os pontos no centro da tela
        for (let i = 0; i < numSegments; i++) {
            segments.push({ x: width / 2, y: height / 2, angle: 0 });
        }

        // 4. LOOP DE ANIMAÇÃO (Executado a cada frame)
        function animate() {
            // Limpa o frame anterior (usando preenchimento semi-transparente para um leve rastro, opcional)
            ctx.fillStyle = '#0c0806';
            ctx.fillRect(0, 0, width, height);

            time += waveSpeed; // Avança o tempo para o cálculo do Seno

            // --- LÓGICA DO RATO (Segue o mouse com margem de segurança) ---
            const dxCursor = mouse.x - prey.x;
            const dyCursor = mouse.y - prey.y;
            const distCursor = Math.hypot(dxCursor, dyCursor);
            
            if (distCursor > 0.1) { // Evita tremulação
                prey.angle = Math.atan2(dyCursor, dxCursor);
                const preyMargin = 50; // Rato nunca chega a menos de 50px do mouse
                const preyError = distCursor - preyMargin;
                // Se o mouse chegar perto, a 'preyError' fica negativa e o rato foge (repulsão)
                prey.x += Math.cos(prey.angle) * preyError * 0.15;
                prey.y += Math.sin(prey.angle) * preyError * 0.15;
            }

            // --- LÓGICA DA CABEÇA DA COBRA (Segue o rato com margem de segurança) ---
            const head = segments[0];
            const dxPrey = prey.x - head.x;
            const dyPrey = prey.y - head.y;
            const distPrey = Math.hypot(dxPrey, dyPrey);
            
            if (distPrey > 0.1) {
                head.angle = Math.atan2(dyPrey, dxPrey);
                const snakeMargin = 80; // Cobra nunca chega a menos de 80px do rato
                const headError = distPrey - snakeMargin;
                // Se o rato recuar rápido demais, a cobra também recua
                head.x += Math.cos(head.angle) * headError * snakeSpeed;
                head.y += Math.sin(head.angle) * headError * snakeSpeed;
            }

            // --- LÓGICA DO CORPO (Cinemática Inversa + Ondulação) ---
            for (let i = 1; i < numSegments; i++) {
                let current = segments[i];
                let prev = segments[i - 1];

                // Vetor apontando do segmento atual para o anterior
                let dx = prev.x - current.x;
                let dy = prev.y - current.y;
                let angle = Math.atan2(dy, dx);
                current.angle = angle;

                // Efeito de rastejar: Calcula um deslocamento senoidal
                let noMovementCount = Math.floor(numSegments / 18); // Zera o movimento apenas no primeiro 1/18 da cobra
                let neckStiffness = 0;
                
                if (i > noMovementCount) {
                    // Crescimento mais lento/suave da força do movimento após o pescoço
                    neckStiffness = Math.min((i - noMovementCount) / 25, 1);
                }
                
                let slitherOffset = Math.sin(time - i * waveFrequency) * (waveAmplitude * neckStiffness);

                // Posição alvo (Atrás do segmento anterior + distância fixa)
                let targetX = prev.x - Math.cos(angle) * segmentLength;
                let targetY = prev.y - Math.sin(angle) * segmentLength;

                // Adiciona o balanço perpendicular (90 graus ou PI/2 do ângulo atual)
                targetX += Math.cos(angle + Math.PI / 2) * slitherOffset;
                targetY += Math.sin(angle + Math.PI / 2) * slitherOffset;

                // Move o segmento para o alvo (Multiplicador reduzido para o corpo reagir mais devagar)
                current.x += (targetX - current.x) * 0.40;
                current.y += (targetY - current.y) * 0.40;
            }

            // --- DESENHAR A COBRA ---
            
            // --- DESENHAR O RATO ---
            ctx.save();
            ctx.translate(prey.x, prey.y);
            ctx.rotate(prey.angle); // O rato olha para o mouse
            
            // Rabinho do rato (Desenhado para trás)
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-8, 0);
            ctx.quadraticCurveTo(-15, -6, -22, 0);
            ctx.stroke();

            // Orelhas
            ctx.fillStyle = '#888';
            ctx.beginPath();
            ctx.arc(3, -5, 3.5, 0, Math.PI * 2);
            ctx.arc(3, 5, 3.5, 0, Math.PI * 2);
            ctx.fill();

            // Corpo
            ctx.fillStyle = '#777';
            ctx.beginPath();
            ctx.ellipse(0, 0, 10, 5.5, 0, 0, Math.PI * 2);
            ctx.fill();

            // Focinho Rosa
            ctx.fillStyle = '#ff99aa';
            ctx.beginPath();
            ctx.arc(10, 0, 1.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            // 1. Desenhar o corpo (De trás pra frente para a cabeça sobrepor o corpo)
            let neckLength = Math.floor(numSegments / 18); // Define 1/18 do corpo como pescoço
            
            for (let i = numSegments - 1; i > 0; i--) {
                let current = segments[i];
                
                // Tamanho: o pescoço mantém a largura da cabeça (32px), o resto afina
                let size = 32;
                if (i > neckLength) {
                    let progress = (i - neckLength) / (numSegments - neckLength);
                    // Usa uma curva exponencial (pow) para afinar com mais naturalidade
                    let easeProgress = Math.pow(progress, 0.8);
                    size = Math.max(4, 32 - (easeProgress * 28)); // Afina de 32 até 4 no rabo
                }

                ctx.beginPath();
                ctx.arc(current.x, current.y, size / 2, 0, Math.PI * 2);
                
                // Cor: Transição perfeita com degradê (Cobre -> Marrom Escuro)
                if (i <= neckLength) {
                    ctx.fillStyle = '#c89a63'; // Mesma cor da cabeça (Cobre)
                } else {
                    let progress = (i - neckLength) / (numSegments - neckLength);
                    // Interpolação matemática de RGB: Do Cobre(200,154,99) ao Marrom Escuro(90,59,32)
                    let r = Math.round(200 - (200 - 90) * progress);
                    let g = Math.round(154 - (154 - 59) * progress);
                    let b = Math.round(99 - (99 - 32) * progress);
                    
                    // Textura super leve (escurece levemente a cada 2 segmentos)
                    let texture = i % 2 === 0 ? 0 : 10; 
                    ctx.fillStyle = `rgb(${r - texture}, ${g - texture}, ${b - texture})`;
                }
                ctx.fill();
            }

            // 2. Desenhar a Cabeça Estilizada
            ctx.save(); // Salva o estado do canvas
            ctx.translate(head.x, head.y); // Move a âncora de desenho para a cabeça
            ctx.rotate(head.angle); // Rotaciona o canvas na direção do mouse

            // Sombra da cabeça para destacá-la do chão
            ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
            ctx.shadowBlur = 12;
            ctx.shadowOffsetY = 6;

            // Formato orgânico e curvado para a cabeça da víbora (mais realista)
            ctx.fillStyle = '#c89a63'; // Cobre
            ctx.beginPath();
            ctx.moveTo(24, 0); // Ponta do focinho
            ctx.bezierCurveTo(20, 12, 5, 18, -6, 16); // Curva da bochecha direita
            ctx.quadraticCurveTo(-12, 0, -6, -16); // Curva da nuca
            ctx.bezierCurveTo(5, -18, 20, -12, 24, 0); // Curva da bochecha esquerda
            ctx.fill();

            // Olhos da cobra
            ctx.fillStyle = '#111'; // Preto
            ctx.beginPath();
            ctx.arc(8, -7, 2.5, 0, Math.PI * 2); // Olho esquerdo mais à frente e afastado
            ctx.arc(8, 7, 2.5, 0, Math.PI * 2);  // Olho direito mais à frente e afastado
            ctx.fill();

            // Pupilas (Reflexo de luz)
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(8.5, -7.5, 0.8, 0, Math.PI * 2);
            ctx.arc(8.5, 7.5, 0.8, 0, Math.PI * 2);
            ctx.fill();

            // Língua bifurcada animada (Seno)
            let tongue = Math.sin(time * 3) * 8; // Oscila de -8 a 8
            if (tongue > 0) { // Aparece apenas em parte do ciclo
                ctx.strokeStyle = '#cc0000';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(24, 0);
                ctx.lineTo(24 + tongue, 0);
                ctx.lineTo(24 + tongue + 3, -3); // Forquilha esquerda
                ctx.moveTo(24 + tongue, 0);
                ctx.lineTo(24 + tongue + 3, 3);  // Forquilha direita
                ctx.stroke();
            }

            ctx.restore(); // Restaura o canvas para não afetar os próximos frames

            // Chama o próximo frame
            requestAnimationFrame(animate);
        }

        // Inicia a animação
        animate();
    </script>
</body>
</html>
